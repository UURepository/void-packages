name: Build Void Packages

on:
  push:
    branches:
      - master
    paths:
      - 'srcpkgs/**'
  workflow_dispatch:
    inputs:
      skip_packages:
        description: 'Optional comma-separated package names to skip (without leading underscore)'
        required: false
        default: ''

run-name: ${{ github.event.head_commit.message || github.ref_name }}

permissions:
  contents: write

jobs:
  build-void:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
      volumes:
        - /dev:/dev
    steps:
      - name: Prepare container
        run: |
          printf '\033[1;34m==> Stage: Prepare container (Void)\033[0m\n'
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps
          xbps-install -y sudo bash curl git libstdc++
          useradd -G xbuilder -M builder

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download existing release info
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          xbps-install -y github-cli
          mkdir -p /tmp/existing-packages

          if gh -R "$GITHUB_REPOSITORY" release view void-repo --json assets --jq '.assets[].name' > /tmp/existing-packages/void-list.txt 2>/dev/null; then
            echo "Found existing void-repo release"
            cat /tmp/existing-packages/void-list.txt
          else
            echo "No existing void-repo release found"
            touch /tmp/existing-packages/void-list.txt
          fi

      - name: Build Void packages
        shell: bash
        run: |
          printf '\033[1;34m==> Stage: Build Void packages\033[0m\n'
          SKIP_INPUT="${{ github.event.inputs.skip_packages }}"
          VOIDPKGS="$(pwd)"

          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> "$VOIDPKGS/etc/conf"
          echo XBPS_CHROOT_CMD=uchroot >> "$VOIDPKGS/etc/conf"
          echo XBPS_ALLOW_RESTRICTED=yes >> "$VOIDPKGS/etc/conf"

          chown -R builder:builder "$VOIDPKGS"
          sudo -Eu builder "$VOIDPKGS/xbps-src" binary-bootstrap

          sudo -Eu builder mkdir -p "$VOIDPKGS/etc/xbps.d/custom"
          sudo -Eu builder tee "$VOIDPKGS/etc/xbps.d/custom/urepo.conf" << 'EOF'
          repository=https://universalrepository.pages.dev/void
          EOF

          sudo -Eu builder mkdir -p "$VOIDPKGS/masterdir-x86_64/var/db/xbps/keys"
          sudo -Eu builder tee "$VOIDPKGS/masterdir-x86_64/var/db/xbps/keys/d3:aa:73:7a:f7:f4:d4:74:05:e5:ca:c8:63:84:73:a7.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple Computer//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
                  <key>public-key</key>
                  <data></data>
                  <key>public-key-size</key>
                  <integer>4096</integer>
                  <key>signature-by</key>
                  <string>Universal Repository CI &lt;ci@universalrepo.local&gt;</string>
          </dict>
          </plist>
          EOF

          xbps-install -S
          sudo -Eu builder xbps-install -r "$VOIDPKGS/masterdir-x86_64" jq curl -y

          # Merge custom shlibs
          sudo -Eu builder bash -c '
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              lib=$(echo "$line" | awk "{print \$1}")
              base=$(echo "$lib" | sed "s/\.so\.[0-9][0-9.]*$//")
              sed -i "/^${base}\.so\./d" '"$VOIDPKGS"'/common/shlibs
              echo "$line" >> '"$VOIDPKGS"'/common/shlibs
            done < '"$VOIDPKGS"'/common/shlibs
          '

          mkdir -p /tmp/built-packages

          for pkgdir in "$VOIDPKGS/srcpkgs"/*; do
            [ -d "$pkgdir" ] || continue
            pkgname=$(basename "$pkgdir")
            case "$pkgname" in _*) echo "Skipping $pkgname"; continue ;; esac
            [ -f "$pkgdir/template" ] || continue

            # Skip subpackages (symlinks)
            [ -L "$pkgdir" ] && continue

            # Skip packages provided from workflow_dispatch input
            if [ -n "$SKIP_INPUT" ]; then
              echo ",$SKIP_INPUT," | grep -q ",$pkgname," && {
                echo "Package $pkgname is in skip list, skipping"
                continue
              }
            fi

            version=$(grep '^version=' "$pkgdir/template" | head -1 | cut -d'=' -f2)
            revision=$(grep '^revision=' "$pkgdir/template" | head -1 | cut -d'=' -f2)
            pkgver_full="${pkgname}-${version}_${revision}"

            # Check if package already exists in release
            if grep -q "^${pkgname}-${version}_${revision}.*\.xbps$" /tmp/existing-packages/void-list.txt 2>/dev/null; then
              echo "Package $pkgver_full already exists in release, skipping"
              continue
            fi

            echo "Building Void package: $pkgver_full"
            chown -R builder:builder "$pkgdir"
            sudo -Eu builder sh -c "cd '$VOIDPKGS' && ./xbps-src -E pkg '$pkgname'"

            find "$VOIDPKGS/hostdir/binpkgs" -name "${pkgname}-*.xbps" -exec cp {} /tmp/built-packages/ \;
            find "$VOIDPKGS/hostdir/binpkgs" -name "${pkgname}-*.xbps.sig*" -exec cp {} /tmp/built-packages/ \; 2>/dev/null || true

            echo "Built packages:"
            ls -lh /tmp/built-packages/*.xbps 2>/dev/null || echo "No packages found"
          done

          echo "All built packages:"
          ls -lh /tmp/built-packages/

      - name: Create Void repository index
        if: always() && github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '\033[1;34m==> Stage: Create Void repository index\033[0m\n'
          WORK_DIR=/tmp/void-repo-packages
          mkdir -p "$WORK_DIR"

          if gh -R "$GITHUB_REPOSITORY" release view void-repo >/dev/null 2>&1; then
            echo "Downloading existing void-repo assets..."
            gh -R "$GITHUB_REPOSITORY" release download void-repo -D "$WORK_DIR" -p '*.xbps' -p '*.xbps.sig' -p '*.xbps.sig2' || true
          fi

          cp /tmp/built-packages/*.xbps "$WORK_DIR"/ 2>/dev/null || true
          cp /tmp/built-packages/*.xbps.sig "$WORK_DIR"/ 2>/dev/null || true
          cp /tmp/built-packages/*.xbps.sig2 "$WORK_DIR"/ 2>/dev/null || true

          parse_void_pkg() {
            local file="$1"
            local base arch verrev name
            base="${file%.xbps}"
            arch="${base##*.}"
            base="${base%.*}"
            verrev="${base##*-}"
            name="${base%-*}"
            printf '%s|%s|%s\n' "$name" "$verrev" "$arch"
          }

          for newpkg in /tmp/built-packages/*.xbps; do
            [ -f "$newpkg" ] || continue
            newfile=$(basename "$newpkg")
            IFS='|' read -r new_name new_verrev _ <<< "$(parse_void_pkg "$newfile")"

            for existing in "$WORK_DIR"/*.xbps; do
              [ -f "$existing" ] || continue
              existing_file=$(basename "$existing")
              IFS='|' read -r existing_name existing_verrev _ <<< "$(parse_void_pkg "$existing_file")"
              [ "$existing_name" = "$new_name" ] || continue
              [ "$existing_verrev" = "$new_verrev" ] && continue
              echo "Void index: removing old $existing_file (replaced by $newfile)"
              rm -f "$WORK_DIR/$existing_file" "$WORK_DIR/$existing_file.sig" "$WORK_DIR/$existing_file.sig2"
            done
          done

          if ! ls "$WORK_DIR"/*.xbps 1>/dev/null 2>&1; then
            echo "No Void packages available to index, skipping"
            exit 0
          fi

          cd "$WORK_DIR"
          XBPS_ARCH=x86_64 xbps-rindex -a *.xbps

          if [ -n "${{ secrets.XBPS_PRIVATE_KEY }}" ]; then
            echo "Signing Void packages and repository metadata..."
            mkdir -p /tmp/xbps-sign
            printf '%s\n' "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/xbps-sign/id_rsa
            chmod 600 /tmp/xbps-sign/id_rsa

            for p in *.xbps; do
              xbps-rindex --privkey /tmp/xbps-sign/id_rsa -S "$p" || true
            done
            XBPS_ARCH=x86_64 xbps-rindex --signedby 'Universal Repository CI <ci@universalrepo.local>' --privkey /tmp/xbps-sign/id_rsa -s . || true
            rm -rf /tmp/xbps-sign
          else
            echo "XBPS_PRIVATE_KEY secret not set; skipping Void package signing"
          fi

          echo "Repository index created"
          ls -lh

      - name: Upload Void packages to release
        if: always() && github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '\033[1;34m==> Stage: Upload Void packages to release\033[0m\n'

          WORK_DIR=/tmp/void-repo-packages

          if ! ls /tmp/built-packages/*.xbps 1>/dev/null 2>&1; then
            echo "No newly built Void packages to upload"
            exit 0
          fi

          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          RELEASE_TAG="void-repo"
          RELEASE_NAME="Void Linux Repository"

          if gh -R "$GITHUB_REPOSITORY" release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG exists"
          else
            echo "Creating release $RELEASE_TAG"
            gh -R "$GITHUB_REPOSITORY" release create "$RELEASE_TAG" \
              --title "$RELEASE_NAME" \
              --notes "Void Linux packages repository. Updated automatically by CI." \
              --prerelease
          fi

          cd /tmp/built-packages

          parse_void_pkg() {
            local file="$1"
            local base arch verrev name
            base="${file%.xbps}"
            arch="${base##*.}"
            base="${base%.*}"
            verrev="${base##*-}"
            name="${base%-*}"
            printf '%s|%s|%s\n' "$name" "$verrev" "$arch"
          }

          for pkg in *.xbps; do
            [ -f "$pkg" ] || continue
            pkgfile=$(basename "$pkg")
            IFS='|' read -r name verrev _ <<< "$(parse_void_pkg "$pkgfile")"

            gh -R "$GITHUB_REPOSITORY" release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | while read -r asset; do
              if [[ "$asset" == "${name}-"*.xbps* ]]; then
                IFS='|' read -r asset_name asset_verrev _ <<< "$(parse_void_pkg "$asset")"
                if [ "$asset_name" = "$name" ] && [ "$asset_verrev" != "$verrev" ]; then
                  echo "Deleting old version: $asset"
                  gh -R "$GITHUB_REPOSITORY" release delete-asset "$RELEASE_TAG" "$asset" -y || true
                fi
              fi
            done
          done

          gh -R "$GITHUB_REPOSITORY" release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | while read -r asset; do
            if [[ "$asset" == *-repodata ]]; then
              echo "Deleting stale metadata asset: $asset"
              gh -R "$GITHUB_REPOSITORY" release delete-asset "$RELEASE_TAG" "$asset" -y || true
            fi
          done

          for pkg in *.xbps; do
            [ -f "$pkg" ] || continue
            echo "Uploading $pkg"
            gh -R "$GITHUB_REPOSITORY" release upload "$RELEASE_TAG" "$pkg" --clobber
            if [ -f "$WORK_DIR/$pkg.sig" ]; then
              gh -R "$GITHUB_REPOSITORY" release upload "$RELEASE_TAG" "$WORK_DIR/$pkg.sig" --clobber
            elif [ -f "$pkg.sig" ]; then
              gh -R "$GITHUB_REPOSITORY" release upload "$RELEASE_TAG" "$pkg.sig" --clobber
            fi
            if [ -f "$WORK_DIR/$pkg.sig2" ]; then
              gh -R "$GITHUB_REPOSITORY" release upload "$RELEASE_TAG" "$WORK_DIR/$pkg.sig2" --clobber
            elif [ -f "$pkg.sig2" ]; then
              gh -R "$GITHUB_REPOSITORY" release upload "$RELEASE_TAG" "$pkg.sig2" --clobber
            fi
          done

          echo "Uploading repository index"
          for idx in "$WORK_DIR"/*-repodata; do
            [ -f "$idx" ] || continue
            gh -R "$GITHUB_REPOSITORY" release upload "$RELEASE_TAG" "$idx" --clobber
          done

          echo "Void packages uploaded successfully"